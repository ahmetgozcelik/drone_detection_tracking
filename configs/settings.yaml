# ============================================================
# drone-tracking-system — Dinamik Ayarlar
# ============================================================
# Bu dosya runtime'da okunur. Kod değişikliği gerekmez.
# Tüm sabitler (değişmez değerler) constants.py içindedir.
# ============================================================

# --- Model & Çıkarım ---
model:
  onnx_path: "models/yolov8n.onnx"        # ONNX export sonrası buraya taşı
  pt_path: "models/yolov8n.pt"            # Ham PyTorch ağırlığı (yedek)
  input_size: 640                          # YOLO giriş çözünürlüğü (px)
  conf_threshold: 0.45                     # Tespit güven eşiği (plan.txt: >0.6)
  iou_threshold: 0.45                      # NMS için IoU eşiği

# --- Hibrit Takip (MOT havuzu) ---
tracker:
  mode: "csrt"                             # "csrt" (hassas) | "kcf" (hızlı)
  fallback_confidence: 0.30               # Bu değerin altında YOLO'ya geri dön
  redetect_interval: 60                   # Her N karede bir arka planda YOLO çalıştır
  # TrackerPool (çoklu hedef) — açık sürüm, OpenCV + IoU/merkez
  mot_match_iou: 0.12                      # Tespit–izleyici eşleşmesi minimum IoU
  mot_match_centroid_max_px: 180.0         # IoU yoksa merkez mesafesi yedeği
  mot_lost_remove_frames: 45                # Uzun süre kayıp → izleyiciyi kaldır
  mot_max_tracks: 8                        # Aynı anda en fazla hedef

# --- Video Kaynakları ---
stream:
  default_source: "usb"                   # "usb" | "rtsp" | "file"
  usb_device_indices: [0, 1]             # Çift kamera: [0, 1] → CompositeStream
                                          # Tek kamera için: usb_device_index: 0
  usb_device_index: 0                    # Tek kamera geri uyumluluk (kullanılmaz)
  rtsp_url: ""                            # Örn: rtsp://admin:pass@192.168.1.64/stream1
  reconnect_attempts: 5                   # Bağlantı kopunca kaç kez dene
  reconnect_delay_sec: 2.0               # Denemeler arası bekleme (saniye)
  frame_queue_maxsize: 2                  # Küçük tut → düşük latency (edge device)

# --- Performans & Bellek (Edge Device Kısıtları) ---
performance:
  max_ram_mb: 1800                        # target_hardware.txt: 2GB limit, güvenli marj
  gc_interval_frames: 100                 # Her N karede bir garbage collection tetikle
  inference_threads: 2                    # ONNX Runtime intra-op thread sayısı
  # Not: Ana thread sayısı 2-3 olarak sınırlandırıldı (target_hardware.txt)

# --- Loglama ---
logging:
  level: "INFO"                           # DEBUG | INFO | WARNING | ERROR
  log_dir: "logs/"
  max_file_size_mb: 10
  backup_count: 3                         # Eski log dosyası tutma sayısı
  enable_console: true

# --- ESP32 Seri Port (SerialController) ---
serial:
  # Port: None → otomatik tespit (CP2102/CH340 VID taraması)
  # Linux: /dev/ttyUSB0  |  macOS: /dev/cu.SLAB_USBtoUART  |  Windows: COM3
  port: null                              # null = otomatik tespit
  baudrate: 115200                        # ESP32 firmware ile eşleşmeli
  timeout_ms: 100                         # Read/write timeout (milisaniye)
  reconnect_attempts: 5                   # Bağlantı kopunca kaç kez dene
  enabled: true                           # false → servo komutları yalnızca loglanır

# --- Sektör Yönetimi (SectorManager) ---
sectors:
  camera_count: 2
  camera_fov_deg: 120.0                   # Her kameranın yatay FOV'u (derece)
  camera_mount_angles: [0.0, 180.0]       # Kamera montaj açıları (Cam A=ön, Cam B=arka)
  pan_range_deg: [-60.0, 60.0]            # Pan servo hareket aralığı
  tilt_range_deg: [0.0, 60.0]             # Tilt servo hareket aralığı (0=yatay, 60=yukarı)
  sweep_enabled: true                     # Drone yokken pan tarama aktif mi
  sweep_period_sec: 4.0                   # Tam ileri-geri tarama süresi (saniye)

# --- UI ---
ui:
  window_title: "Drone Takip Sistemi"
  display_fps: true
  display_latency: true
  display_coordinates: true
  bbox_color: [0, 255, 0]                # BGR: Yeşil
  bbox_thickness: 2
